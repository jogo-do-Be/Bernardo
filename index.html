<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo do Bê</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee&family=Chakra+Petch:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="mini-shell">
      <header class="topbar">
        <h1>Jogo do Bê</h1>
        <div class="chips">
          <p class="chip">Pontos <strong id="score">0</strong></p>
          <p class="chip">Recorde <strong id="high-score">0</strong></p>
          <p class="chip">Nível <strong id="level">1</strong></p>
        </div>
      </header>

      <section class="arena-card">
        <p id="status" class="status-pill">Carregando imagens...</p>
        <canvas id="game" width="600" height="600"></canvas>

        <div class="actions">
          <button id="start-btn" class="action-btn primary" disabled>Jogar</button>
          <button id="pause-btn" class="action-btn" disabled>Pausar</button>
        </div>

        <p id="pieces-count" class="meta">Buscando skins em <code>/pieces</code>...</p>
      </section>

      <section class="pad-card" aria-label="Controles">
        <div class="dpad">
          <button class="dir-btn up" data-dir="up" aria-label="Cima">▲</button>
          <button class="dir-btn left" data-dir="left" aria-label="Esquerda">◀</button>
          <button class="dir-btn right" data-dir="right" aria-label="Direita">▶</button>
          <button class="dir-btn down" data-dir="down" aria-label="Baixo">▼</button>
        </div>
        <p class="meta">Setas/WASD no teclado e swipe no tabuleiro também funcionam.</p>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
